        <script>
            //Closure => kombinasi function dan bundel referensi ke data di sekitarnya
            function createAdder(value){
                const owner ="Sahla"; //local scope
                
                function add(param){
                    console.info(owner);
                    return value + param;
                }

                return add;
            }

            const addTwo = createAdder (2);
            console.info(addTwo(3));
