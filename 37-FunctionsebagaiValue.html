<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width", initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>
           //Function sbg value
           function sayHello(name){
            document.write(`<p>hello, ${name} </p>`);
           }

           const hello = sayHello
           hello("Rani");

           //callback => function yang dijadikan parameter dari function lain
           function giveMeName(callback){ //callback = sayHello
            callback("Rani"); //sayHello"Rani"
           }

           giveMeName(sayHello);
           giveMeName(hello);
        </script>
    </body>
</html>
