<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width", initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>
           let nama = prompt("siapa namamu?"); // menampilkan kotak dialog dengan input field
           alert("namamu " + nama); //menampilkan kotak pesan satu arah
           if(confirm("yakin?")) document.write("yes"); //confirm untuk menampilkan kotak dialog ok dan cancel
           else document.write("no");
        </script>
    </body>
</html>
