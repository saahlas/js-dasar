<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width", initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        f12
        <script>
           //Array di JS bersifat dinamis(bisa bertambah sendirinya)
           angka = [1,2,3,4,5]; //contoh array
           console.table(angka);
           console.log(angka[0]); //angka index ke 0
           d = angka[2];
           console.log(d);
           
           x= [];
           x[0] = 1;
           x[1] = 4;
           x[3] = 7;
           console.table(x);

           hewan = ["sapi", "koala", "macan"];
           console.table(hewan);

           //Method di Array
           console.log(angka.length); //mengambil panjang array
           console.log(hewan.join()); //mengubah array jadi string
           console.log(hewan.join(""));
           console.log(hewan.join("-"));

           hewan.push("anjing", "kelinci"); //menambahkann element di akhir array
           console.table(hewan);

           delete hewan[0]; //menghapus hewan index 0, namun index tidak bergeser
           console.table(hewan);

           hewan.pop(); //menghapus akhir array
           console.table(hewan);

           hewan.unshift("domba"); //menambah element di awal array
           console.table(hewan);

           hewan.shift(); //menghapus element awal array
           console.table(hewan);

           arr =["arfin", "maya", "brila", "dila"];
           newarr= arr.slice(1, 3); //memisah array menjadi array yang baru
           console.table(arr);
           console.table(newarr);

           //splice(i awal, jumlah mau dihapus, elbaru1, elbaru2, ...)
           hewan.splice(2,0, "jerapah", "panda");
           console.table(hewan);

           //menampilkan array
           for (let index = 0; index < angka.length; index++) { //for loop/ Loop dari index 0 sampai habis, tapi iterasi ambil angka lalu log
            const element = angka[index];
            console.log(element);
           }

           angka.forEach((e, i) => { // e = nilai element dan i = index
            console.log("i ke-" + i + " adalah" + e);
           });

           var newangka = angka.map((e) => { //buat array baru, dimana tiap element kali 6
            return e * 6;
           });
           console.table(newangka);

           var angkabaru = [3,1,4,4,6,2,3,4,2,6];
           var angka2 = angkabaru.filter((x) => {
            //mencari elemen(cuman bisa satu / pertama kali ditemukan)
            return x == 1;
           });
           console.table(angka2);
        </script>
    </body>
</html>
