        <script>
           //Debugger => proses mencari bug (debbuging)
           //fitur bawaan browser
           //dengan debugger kita bisa menghentikan program diposisi yang diinginkan(breakpoint)
           function createfullname(fn,mn, ln){
            debugger;
            const fullname = `${mn} ${fn} ${ln} ${mn}`;
            return fullname;
           }
           const name = createfullname("Ahmad", "Budi", "Irawan");
           console.info(name);
           </script>
