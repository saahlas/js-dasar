<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTP-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width", initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>
           // STRING => teks
           // berisi kumpulan kosong atau lebih karakter
           // bisa kombinasikan petik dua atau petik satu

           document.writeln("Jangan lupa praktikum besok Senin")

           // menambah string

           document.writeln("<br>" + "nama saya: "+ "Sahla" + "<br>");
           
           /*Escape Squence
        ---------------------
            \n  |   enter   |
            \t  |   tab     |
            \'  |   '       |
            \"  |   "       |
            \\  |   \       |
        ---------------------
            */
           document.writeln("<textarea cols='100' rows='10'>\n");
           document.writeln('\tnama panggilan   :"Salsal"\n');
           document.writeln('\talamat   :"Jl. Belitung Barat"\n');
           document.writeln('\thobi :"Bersepeda, Membaca"\n');
           document.writeln("</textarea>");
        
        </script>
    </body>
</html>
