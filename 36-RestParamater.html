<!DOCTYPE html>
<html lang="en">

    <body>
        <script>
            //rest parameter => fitur mengirimkam data sebanyak-banyaknya pada satu parameter
            //dan seacara otomatis dikonversi menjadi array
            //rest paramater hanya boleh ada 1 dan harus diakhir parameter function
            function getRataRata(...data){
                let total =0;
                data.map((e) => {
                    total += e;
                });
                return total / data.length;
            }
            document.write(`<p>${getRataRata(10, 30, 140, 43)}</p>`);

            //Speard Syntax
            //apabila terlanjur menggunakan array
            const data = [7,2,2,54,3,46,34];
            document.write(`<p>${getRataRata(...data)}</p>`);

            }
            document.write(`<p>${getRataRata(10,30,140,43)}</p>`); 
        </script>
    </body>
</html>
